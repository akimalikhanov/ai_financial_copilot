<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using Inter as a Söhne alternative (clean, modern, highly readable) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Menlo', 'monospace'],
            },
            colors: {
              // Map CSS variables to Tailwind classes
              // This allows using classes like bg-surface-1, text-muted, etc.
              bg: 'var(--bg)',
              'surface-1': 'var(--surface-1)',
              'surface-2': 'var(--surface-2)',
              'surface-3': 'var(--surface-3)',
              border: 'var(--border)',
              'border-subtle': 'var(--border-subtle)',
              text: 'var(--text)',
              'text-muted': 'var(--text-muted)',
              'text-faint': 'var(--text-faint)',
              icon: 'var(--icon)',
              accent: {
                DEFAULT: 'var(--accent)',
                hover: 'var(--accent-hover)',
                pressed: 'var(--accent-pressed)',
                subtle: 'var(--accent-subtle)',
              },
              success: {
                DEFAULT: 'var(--success)',
                bg: 'var(--success-bg)',
              },
              warning: {
                DEFAULT: 'var(--warning)',
                bg: 'var(--warning-bg)',
              },
              danger: {
                DEFAULT: 'var(--danger)',
                bg: 'var(--danger-bg)',
              },
              input: {
                bg: 'var(--input-bg)',
                border: 'var(--input-border)',
                'border-focus': 'var(--input-border-focus)',
              },
              code: {
                bg: 'var(--code-bg)',
                border: 'var(--code-border)',
              },
              bubble: {
                user: 'var(--bubble-user-bg)',
                assistant: 'var(--bubble-assistant-bg)',
              },
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-in-right': 'slideInRight 0.3s ease-out forwards',
              'slide-in-up': 'slideInUp 0.2s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideInRight: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(0)' },
              },
              slideInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
            boxShadow: {
              'focus-ring': '0 0 0 2px var(--focus-ring)',
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/index.css">
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
