server {
    listen 80;
    server_name _;

    # Serve the React SPA from the build output
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /v1/* and /api/* → FastAPI service.
    # The upstream host resolves via Docker Compose service name ("api")
    # or K8s ClusterIP DNS.
    client_max_body_size 200m;

    location /v1/ {
        proxy_pass http://${API_HOST}:${API_PORT}/v1/;
        proxy_http_version 1.1;

        # Required for SSE (chunked streaming)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeout for long SSE streams
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://${API_HOST}:${API_PORT}/;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: any path not matched above returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck probe used by Docker / K8s
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
