name: Canary

# Manual only: the eval environment (seeded DB, Qdrant/OpenSearch, GPU-backed TEI
# embedder + reranker) lives on a local self-hosted machine, so this runs on a
# self-hosted runner registered on that machine and is triggered on demand when it
# is up — not on a schedule that would fire while the machine is off.
on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model ID to answer questions with (see infra/config/models.yaml)"
        required: false
        default: "gpt-4o-mini"
        type: string
      reasoning_effort:
        description: "Reasoning effort for the synthesis model (e.g. low, medium, high); leave blank for model default"
        required: false
        default: ""
        type: string
      max_tokens:
        description: "Override synthesis model max output tokens (raise for reasoning models at high effort so reasoning doesn't starve the answer); blank = model default"
        required: false
        default: ""
        type: string
      limit:
        description: "Run only the first N questions (for smoke-testing the workflow); leave blank to run the full set"
        required: false
        default: ""
        type: string
      run_kind:
        description: "Discriminator for the persisted run + compare-to-latest lookup. Keep 'agentic' for the main trend; use a distinct value to track an experiment as a separate trend line."
        required: false
        default: "agentic"
        type: string
      run_description:
        description: "Optional free-text note stored on the run (e.g. what this run is testing)"
        required: false
        default: ""
        type: string

jobs:
  canary:
    runs-on: self-hosted
    environment: eval
    env:
      OPENAI_API_KEY: ${{ secrets.EVAL_OPENAI_API_KEY }}
      # DB is read via APP_DB_* (see config.py get_database_url); pgbouncer on :6432.
      APP_DB_HOST: ${{ secrets.EVAL_APP_DB_HOST }}
      APP_DB_PORT: ${{ secrets.EVAL_APP_DB_PORT }}
      APP_DB_USER: ${{ secrets.EVAL_APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.EVAL_APP_DB_PASSWORD }}
      APP_DB_NAME: ${{ secrets.EVAL_APP_DB_NAME }}
      QDRANT_HOST: ${{ secrets.EVAL_QDRANT_HOST }}
      QDRANT_PORT: ${{ secrets.EVAL_QDRANT_PORT }}
      OPENSEARCH_HOST: ${{ secrets.EVAL_OPENSEARCH_HOST }}
      OPENSEARCH_HTTP_PORT: ${{ secrets.EVAL_OPENSEARCH_HTTP_PORT }}
      EMBEDDER_BASE_URL: ${{ secrets.EVAL_EMBEDDER_BASE_URL }}
      RERANKER_BASE_URL: ${{ secrets.EVAL_RERANKER_BASE_URL }}
      REDIS_APP_HOST: ${{ secrets.EVAL_REDIS_APP_HOST }}
      REDIS_APP_PORT: ${{ secrets.EVAL_REDIS_APP_PORT }}
      REDIS_APP_PASSWORD: ${{ secrets.EVAL_REDIS_APP_PASSWORD }}
      EVAL_USER_ID: ${{ secrets.EVAL_USER_ID }}
      # Behavioral config (embedding provider, reranker settings, agent tool model, etc.)
      # comes from .env.example via the "Load behavioral config" step below — NOT hardcoded
      # here — so it can't drift from what the app actually ships. Above are only the
      # eval-environment connection targets (hosts/ports/keys), which override the
      # .env.example localhost defaults: config.py's load_dotenv(override=False) makes
      # process env (these secrets) win over the .env file.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Isolate this self-hosted runner's uv cache from the developer's shared
      # ~/.cache/uv (which backs ~20 other project venvs on this box). Persistent
      # across canary runs so torch/vllm/CUDA wheels aren't re-downloaded, but
      # independently measurable/prunable, and canary's uv.lock churn no longer
      # bloats the dev cache. $HOME is expanded here (not resolvable in job env:).
      - name: Isolate uv cache
        run: echo "UV_CACHE_DIR=$HOME/.cache/uv-canary" >> "$GITHUB_ENV"
        shell: bash
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
          # Self-hosted runner: the isolated local UV_CACHE_DIR set above persists across
          # runs on this machine, so the GitHub Actions remote cache is redundant overhead
          # that always misses (its key bakes in the hosted-runner OS image).
          enable-remote-cache: "false"
      # Single source of truth for behavioral config (same as ci.yml). config.py's
      # load_dotenv() reads this .env; the job-level env: secrets above already in the
      # process env win (override=False), so eval hosts/keys override the localhost
      # defaults while everything else (embedder provider, reranker, models) matches ship.
      - name: Load behavioral config from .env.example
        run: cp .env.example .env
        shell: bash
      - name: Run canary eval
        # RUN_DESCRIPTION goes through env (not string-interpolated) so a multi-word note
        # is passed as a single quoted argv rather than splitting on spaces. The trailing
        # optional flags use GHA conditionals: empty input -> flag omitted entirely.
        env:
          RUN_DESCRIPTION: ${{ inputs.run_description }}
        run: |
          uv run python -m src.eval.run_agent \
            --test-set src/eval/fixtures/canary_eval.json \
            --output /tmp/canary_latest.json \
            --compare src/eval/fixtures/runs/canary_baseline.json \
            --compare-to-latest-db \
            --persist-db \
            --model "${{ inputs.model }}" \
            --prompt-version v3_agent_synthesis \
            --run-kind "${{ inputs.run_kind }}" \
            ${{ inputs.limit != '' && format('--limit {0}', inputs.limit) || '' }} \
            ${{ inputs.reasoning_effort != '' && format('--reasoning-effort {0}', inputs.reasoning_effort) || '' }} \
            ${{ inputs.max_tokens != '' && format('--max-tokens {0}', inputs.max_tokens) || '' }} \
            ${RUN_DESCRIPTION:+--run-description "$RUN_DESCRIPTION"}
      - name: Check for regressions
        run: |
          uv run python -c "
          import json, sys
          out = json.load(open('/tmp/canary_latest_vs_canary_baseline.compare.json'))
          sys.exit(1 if out.get('regressions') else 0)
          "
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: canary-run
          path: |
            /tmp/canary_latest.json
            /tmp/canary_latest_vs_canary_baseline.compare.json
            /tmp/canary_latest_vs_latest_db.compare.json
          if-no-files-found: ignore
      # Keep the isolated canary cache bounded: prune artifacts not referenced by the
      # current checkout's venv (chiefly stale torch/vllm/CUDA wheels left behind when
      # uv.lock bumps those pins). Runs even on failure so the cache can't grow unbounded.
      - name: Prune canary uv cache
        if: always()
        run: uv cache prune
        shell: bash
