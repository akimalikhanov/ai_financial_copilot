name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSE_FILE: infra/docker/docker-compose.yml

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
      - run: make lint

  typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - run: make typecheck

  unit-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - run: cp .env.example .env
      - run: .venv/bin/python -m pytest tests/unit/ --cov=src --cov-report=html --cov-report=term
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/

  integration-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - name: Resolve HF tokenizer model
        id: tokenizer
        run: |
          cp .env.example .env
          model=$(grep -m1 '^CHUNKING_TOKENIZER_MODEL=' .env | cut -d= -f2-)
          echo "model=${model:-nomic-ai/nomic-embed-text-v1.5}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-${{ steps.tokenizer.outputs.model }}
      - name: Start backing services
        run: |
          docker compose --env-file .env up -d --wait \
            postgres pgbouncer redis-app redis-broker qdrant opensearch
      - run: make test-integration
      - name: Tear down services
        if: always()
        run: docker compose --env-file .env down -v

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - name: pip-audit
        # Remaining findings below have no fix version available upstream yet: vllm==0.19.1
        # is the newest release compatible with the rest of our dependency graph, and it
        # transitively pins exact versions of diskcache/torch/transformers that also carry
        # unresolved CVEs. Re-check for fixes and drop these --ignore-vuln entries once
        # available. TODO: re-add --strict once the existing CVE backlog is triaged/fixed.
        run: |
          uv export --frozen --no-hashes --group dev --group llm-engine -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln CVE-2026-4372 \
            --ignore-vuln PYSEC-2026-145 \
            --ignore-vuln PYSEC-2026-227 \
            --ignore-vuln PYSEC-2026-226 \
            --ignore-vuln CVE-2026-44222 \
            --ignore-vuln CVE-2026-47155 \
            --ignore-vuln CVE-2026-41523 \
            --ignore-vuln CVE-2026-53923 \
            --ignore-vuln CVE-2026-54236 \
            --ignore-vuln CVE-2026-12491 \
            --ignore-vuln CVE-2026-54235 \
            --ignore-vuln CVE-2026-54233
      - name: semgrep
        run: uvx semgrep scan --config p/python --config p/secrets --error

  docker:
    # Cheap static checks only — no image builds.
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Parse the compose file with the .env.example values substituted in and fail on
      # any schema/interpolation error (unknown keys, bad types, unset ${VAR} with no
      # default). Catches a broken compose file without starting any container.
      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose --env-file .env config --quiet
      # hadolint = a Dockerfile linter. It parses each Dockerfile's instructions and
      # flags anti-patterns and mistakes (unpinned `apt-get install` versions, missing
      # `--no-install-recommends`, `ADD` where `COPY` suffices, running as root, shell
      # form pitfalls, etc.), plus ShellCheck on every RUN script. failure-threshold:
      # error means only error-level rules break CI; warnings/info are informational.
      - name: Lint Dockerfile.api (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: infra/docker/Dockerfile.api
          failure-threshold: error
      - name: Lint Dockerfile.worker (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: infra/docker/Dockerfile.worker
          failure-threshold: error
      - name: Lint Dockerfile.frontend (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: infra/docker/Dockerfile.frontend
          failure-threshold: error
      # trivy `config` scan = infrastructure-as-code misconfiguration scanner. Unlike
      # hadolint (style/best-practice), this looks for SECURITY misconfigurations in
      # Dockerfiles/compose/IaC across the repo (scan-ref: .) — e.g. images without a
      # pinned digest, secrets baked into layers, over-broad privileges. Fails the job
      # (exit-code: 1) only on HIGH/CRITICAL findings; .venv and node_modules skipped.
      - name: Scan Dockerfiles for misconfigurations (trivy config)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          skip-dirs: .venv,node_modules
          exit-code: 1
          severity: HIGH,CRITICAL

  frontend-typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - run: npm ci
        working-directory: src/ui
      - run: npx tsc --noEmit
        working-directory: src/ui

  # --------------------
  # All checks passed gate
  # --------------------
  ci-success:
    name: CI Success
    needs:
      - lint
      - typecheck
      - unit-tests
      - integration-tests
      - security
      - docker
      - frontend-typecheck
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.unit-tests.result }}"
            "${{ needs.integration-tests.result }}"
            "${{ needs.security.result }}"
            "${{ needs.docker.result }}"
            "${{ needs.frontend-typecheck.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "One or more required jobs failed"
              exit 1
            fi
          done
          echo "All CI checks passed!"
