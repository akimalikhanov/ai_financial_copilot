name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: infra/docker/docker-compose.yml

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
      - run: make lint

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - run: make typecheck

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - run: cp .env.example .env
      - run: .venv/bin/python -m pytest tests/unit/ --cov=src --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - name: Resolve HF tokenizer model
        id: tokenizer
        run: |
          cp .env.example .env
          model=$(grep -m1 '^CHUNKING_TOKENIZER_MODEL=' .env | cut -d= -f2-)
          echo "model=${model:-nomic-ai/nomic-embed-text-v1.5}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-${{ steps.tokenizer.outputs.model }}
      - name: Start backing services
        run: |
          docker compose --env-file .env up -d --wait \
            postgres pgbouncer redis-app redis-broker qdrant opensearch
      - run: make test-integration
      - name: Tear down services
        if: always()
        run: docker compose --env-file .env down -v

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-python-env
        with:
          groups: dev llm-engine
      - name: pip-audit
        run: |
          uv export --frozen --no-hashes --group dev --group llm-engine -o /tmp/requirements.txt
          uvx pip-audit --strict -r /tmp/requirements.txt
      - name: semgrep
        run: uvx semgrep scan --config p/python --config p/secrets --error

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose --env-file .env config --quiet
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=min
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=min
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=min

  frontend-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - run: npm ci
        working-directory: src/ui
      - run: npx tsc --noEmit
        working-directory: src/ui
