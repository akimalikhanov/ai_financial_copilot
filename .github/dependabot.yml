version: 2
updates:
  # Keep pinned action SHAs current (updates the SHA and the version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Frontend npm dependencies (src/ui).
  - package-ecosystem: npm
    directory: /src/ui
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
