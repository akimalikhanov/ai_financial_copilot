name: Setup Python env
description: Install uv with caching and sync the project's Python dependencies. Requires the repo to already be checked out.

inputs:
  groups:
    description: Space-separated uv dependency groups to sync
    required: false
    default: dev
  enable-remote-cache:
    description: >-
      Cache the uv wheel cache via the GitHub Actions cache service. Leave true on
      GitHub-hosted runners. Set false on self-hosted runners, where the local
      UV_CACHE_DIR (~/.cache/uv) already persists across runs on the same machine,
      making the remote save/restore redundant overhead that always misses.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Self-hosted runners inherit the launching shell's environment. If that shell had
    # the developer's project .venv activated, VIRTUAL_ENV leaks in pointing at a path
    # uv can't reconcile with the runner's own checkout, so uv warns and ignores it.
    # Clear it for every subsequent step in the job (via GITHUB_ENV) so uv and any
    # later `uv run` unambiguously target this checkout's .venv. No-op on GitHub-hosted
    # runners, where VIRTUAL_ENV isn't set.
    - run: echo "VIRTUAL_ENV=" >> "$GITHUB_ENV"
      shell: bash
    - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      with:
        enable-cache: ${{ inputs.enable-remote-cache }}
        cache-dependency-glob: uv.lock
    - run: |
        args=()
        for group in ${{ inputs.groups }}; do
          args+=(--group "$group")
        done
        uv sync --frozen "${args[@]}"
      shell: bash
