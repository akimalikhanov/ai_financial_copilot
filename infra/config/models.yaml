defaults:
  params:
    temperature: 0.2
    max_tokens: 2000
    seed: null
    reasoning_effort: null
    verbosity: null
  stream: true

models:
  # === Cloud adapters ===
  - id: gpt-5.2
    label: "OpenAI GPT-5.2"
    provider: openai
    model_name: "gpt-5.2"
    pricing:
      currency: USD
      unit: per_1k_tokens
      input: ${GPT5_2_INPUT_PRICE:-0.00175}
      output: ${GPT5_2_OUTPUT_PRICE:-0.01400}
      cached_input: ${GPT5_2_CACHED_INPUT_PRICE:-0.000175}
      cached_output: null
      rounding: exact
      effective: 2025-12-11
      notes: "OpenAI standard pricing (per 1M: $1.75 in, $0.175 cached in, $14 out)."
    capabilities:
      streaming: true
      tool_calling: true
    params_override: {temperature: 1.0, max_tokens: 2000, verbosity: low}

