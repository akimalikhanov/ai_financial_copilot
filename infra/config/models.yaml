defaults:
  params:
    temperature: 0.2
    max_tokens: 2000
    # seed: null
    # reasoning_effort: null
    # verbosity: null
  stream: true

models:
  # === Cloud adapters ===
  - id: gpt-5.2
    label: "OpenAI GPT-5.2"
    provider: openai
    model_name: "gpt-5.2"
    pricing:
      currency: USD
      unit: per_1k_tokens
      input: ${GPT5_2_INPUT_PRICE:-0.00175}
      output: ${GPT5_2_OUTPUT_PRICE:-0.01400}
      cached_input: ${GPT5_2_CACHED_INPUT_PRICE:-0.000175}
      cached_output: null
      rounding: exact
      effective: 2025-12-11
      notes: "OpenAI standard pricing (per 1M: $1.75 in, $0.175 cached in, $14 out)."
    capabilities:
      streaming: true
      tool_calling: true
      citation_mode: bracket
    params_override: {temperature: 1.0, max_tokens: 2000, verbosity: low, reasoning_effort: low}

  - id: gpt-5-mini
    label: "OpenAI GPT-5-mini"
    provider: openai
    model_name: "gpt-5-mini"
    pricing:
      currency: USD
      unit: per_1k_tokens
      input: ${GPT5_MINI_INPUT_PRICE:-0.00025}
      output: ${GPT5_MINI_OUTPUT_PRICE:-0.00200}
      cached_input: ${GPT5_MINI_CACHED_INPUT_PRICE:-0.000025}
      cached_output: null
      rounding: exact
      effective: 2025-12-11
      notes: "OpenAI standard pricing (per 1M: $0.25 in, $0.025 cached in, $2 out)."
    capabilities:
      streaming: true
      tool_calling: true
      citation_mode: none
    params_override: {temperature: 1.0, reasoning_effort: low, verbosity: low}

  - id: gpt-4o-mini
    label: "OpenAI GPT-4o-mini"
    provider: openai
    model_name: "gpt-4o-mini"
    pricing:
      currency: USD
      unit: per_1k_tokens
      input: ${GPT4O_MINI_INPUT_PRICE:-0.00015}
      output: ${GPT4O_MINI_OUTPUT_PRICE:-0.00060}
      cached_input: ${GPT4O_MINI_CACHED_INPUT_PRICE:-0.000075}
      cached_output: null
      rounding: exact
      effective: 2025-07-18
      notes: "OpenAI standard pricing (per 1M: $0.15 in, $0.075 cached in, $0.60 out)."
    capabilities:
      streaming: true
      tool_calling: true
      citation_mode: none
    params_override: {}

  # === Google Gemini adapters ===

  - id: gemini-2.5-flash
    label: "Gemini 2.5 Flash"
    provider: google
    model_name: "gemini-2.5-flash"
    pricing:
      currency: USD
      unit: per_1k_tokens
      input: ${GEMINI_FLASH_INPUT_PRICE:-0.00030}
      output: ${GEMINI_FLASH_OUTPUT_PRICE:-0.00250}
      cached_input: ${GEMINI_FLASH_CACHE_PRICE:-0.00003}
      cached_output: null
      rounding: exact
      effective: 2025-09-01
      notes: "Paid tier (per 1M: $0.30 in, $2.50 out, caching $0.03)."
    capabilities:
      streaming: true
      tool_calling: true
      citation_mode: none
    params_override: {}

  # === Local vLLM adapters ===
  - id: qwen3-8b
    label: "Qwen3-8B-AWQ"
    provider: vllm
    model_path: "Qwen/Qwen3-8B-AWQ"
    server:
      host: "${QWEN_SERVER_HOST:-localhost}"
      port: "${QWEN_SERVER_PORT:-8001}"
      base_path: "/v1"
    include_usage: true
    pricing:
      currency: USD
      unit: local
      cost: 0.0
      notes: "Running on self-hosted GPU with vLLM. No API billing."
    capabilities:
      streaming: true
      tool_calling: true
      citation_mode: bracket
    params_override: {}
