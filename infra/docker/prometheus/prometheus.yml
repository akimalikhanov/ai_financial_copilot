global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI – exposed via make_asgi_app() on the main port
  - job_name: api
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  # Celery chat worker – starts its own HTTP server on :9100
  - job_name: chat_worker
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # Celery ingestion worker – starts its own HTTP server on :9101
  - job_name: ingestion_worker
    static_configs:
      - targets: ["host.docker.internal:9101"]
