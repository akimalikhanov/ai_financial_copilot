[SERVICE]
    Flush         2
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Container mode (compose app tier): receive logs from the api / worker-chat /
# worker-ingestion containers via Docker's fluentd log driver (tag "app").
# The app logs JSON to stdout; Docker wraps each line in a "log" key, unpacked
# by the parser FILTER below. This replaces the former host-file tail input.
[INPUT]
    Name          forward
    Tag           app
    Listen        0.0.0.0
    Port          24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# The fluentd driver delivers the app's JSON line in the "log" key — parse it so
# request_id / trace_id / level become top-level fields for Elasticsearch.
[FILTER]
    Name          parser
    Match         app
    Key_Name      log
    Parser        json_log
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name          grep
    Match         *
    Exclude       $path ^/(metrics|healthz)/?$

[OUTPUT]
    Name               es
    Match              *
    Host               ${ES_HOST}
    Port               ${ES_PORT}
    Index              copilot-logs
    Suppress_Type_Name On
    Time_Key           timestamp
    Time_Key_Format    %Y-%m-%dT%H:%M:%S.%LZ
    Retry_Limit        3
    Buffer_Size        5MB
