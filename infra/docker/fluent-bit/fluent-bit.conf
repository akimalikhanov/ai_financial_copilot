[SERVICE]
    Flush         2
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Host-process dev mode: tail the file the app writes to (LOG_FILE env var).
# No-op when the file doesn't exist. In Docker mode, set LOG_FILE="" and
# the app won't create the file, so this input stays idle.
[INPUT]
    Name             tail
    Tag              app
    Path             ${LOG_FILE}
    Parser           json_log
    DB               /tmp/fluent-bit-tail.db
    Refresh_Interval 2
    Skip_Empty_Lines On
    Ignore_Older     1h

# Docker mode: receive logs from containers using the fluentd log driver.
# In host-process dev mode this input receives nothing (no containers send to it).
[INPUT]
    Name          forward
    Tag           app
    Listen        0.0.0.0
    Port          24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# For Docker forward input, the JSON body arrives in the "log" key — parse it
# so request_id/trace_id become top-level fields.
# Tail input already parses via Parser= above, so Reserve_Data is safe for both.
[FILTER]
    Name          parser
    Match         app
    Key_Name      log
    Parser        json_log
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name          grep
    Match         *
    Exclude       path ^/metrics$

[OUTPUT]
    Name               es
    Match              *
    Host               ${ES_HOST}
    Port               ${ES_PORT}
    Index              copilot-logs
    Suppress_Type_Name On
    Time_Key           timestamp
    Time_Key_Format    %Y-%m-%dT%H:%M:%S.%LZ
    Retry_Limit        3
    Buffer_Size        5MB
