x-logging: &default-logging
  logging:
    driver: local
    options:
      mode: non-blocking
      max-buffer-size: 12m

networks:
  backend:

volumes:
  postgres_data:
  redis_app_data:
  redis_broker_data:
  qdrant_data:
  opensearch_data:
  garage_data:
  garage_meta:

services:
  postgres:
    image: postgres:16.11-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      # superuser / default DB created by entrypoint
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # passed through for ../db_init/init.sh
      LANGFUSE_DB: ${LANGFUSE_DB:-langfuse}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD}

      APP_DB: ${APP_DB:-app}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/db_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    cpus: "1.00"
    mem_limit: 1g
    <<: *default-logging
    networks: [backend]

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: pgbouncer
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # superuser creds (also used by auth_query connection)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_USER: ${APP_DB_USER}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD}

      # DB names created by your init.sh
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB: ${APP_DB:-app}
      LANGFUSE_DB: ${LANGFUSE_DB:-langfuse}

      # Where Postgres is reachable from PgBouncer
      PGB_POSTGRES_HOST: ${PGB_POSTGRES_HOST:-postgres}
      PGB_POSTGRES_PORT: ${PGB_POSTGRES_PORT:-5432}

      # PgBouncer listen
      PGB_LISTEN_ADDR: ${PGB_LISTEN_ADDR:-0.0.0.0}
      PGB_LISTEN_PORT: ${PGB_LISTEN_PORT:-6432}

    entrypoint: ["/bin/sh", "/pgbouncer-entrypoint.sh"]
    volumes:
      - ../scripts/pgbouncer-entrypoint.sh:/pgbouncer-entrypoint.sh:ro

    ports:
      - "127.0.0.1:${PGB_PORT:-6432}:6432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$$POSTGRES_PASSWORD psql -h 127.0.0.1 -p $$PGB_LISTEN_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' >/dev/null"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    cpus: "0.25"
    mem_limit: 128m
    <<: *default-logging
    networks: [backend]
    restart: unless-stopped

  redis-app:
    image: redis:7.2.12-alpine
    container_name: redis-app
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_app_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    cpus: "0.50"
    mem_limit: 512m
    <<: *default-logging
    networks: [backend]

  redis-broker:
    image: redis:7.2.12-alpine
    container_name: redis-broker
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_broker_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    cpus: "0.50"
    mem_limit: 512m
    <<: *default-logging
    networks: [backend]

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
      # DEV ONLY:
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    cpus: "1.50"
    mem_limit: 1536m
    <<: *default-logging
    networks: [backend]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: http://opensearch:9200
      # DEV ONLY:
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    cpus: "0.50"
    mem_limit: 512m
    <<: *default-logging
    networks: [backend]

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant
    restart: unless-stopped
    networks: [backend]
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Garage: S3-compatible object storage (alternative to MinIO), e.g. for PDFs.
  # Docs: https://garagehq.deuxfleurs.fr/documentation/
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - ./garage/secrets:/run/secrets:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT:-3900}:3900"
      - "127.0.0.1:3901:3901"
      - "127.0.0.1:3902:3902"
      - "127.0.0.1:3903:3903"
    cpus: "0.50"
    mem_limit: 512m
    <<: *default-logging
    networks: [backend]

  # One-time bootstrap: layout, bucket pdfs, key app-key.
  # Run: docker compose run --rm garage-bootstrap  (or: docker compose up garage-bootstrap)
  garage-bootstrap:
    profiles:
      - garage-bootstrap
    build:
      context: ..
      dockerfile: docker/garage/garage_bootstrap.Dockerfile
    container_name: garage-bootstrap
    depends_on:
      garage:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./garage/secrets:/secrets
    networks: [backend]
    restart: "no"

  qdrant-hc:
    image: busybox:1.36
    container_name: qdrant-hc
    depends_on:
      qdrant:
        condition: service_started
    networks: [backend]

    mem_limit: 64m
    mem_reservation: 16m
    cpus: "0.10"
    <<: *default-logging
    command: ["sh", "-c", "sleep 9999999"]
    # Choose ONE endpoint:
    # - /healthz = “alive” style
    # - /readyz = “ready” style (preferred if you want readiness gating)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://qdrant:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped
