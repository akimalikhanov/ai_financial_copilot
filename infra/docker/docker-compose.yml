x-logging: &default-logging
  logging:
    driver: local
    options:
      mode: non-blocking
      max-buffer-size: 12m

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

services:
  postgres:
    image: postgres:16.11-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      # superuser / default DB created by entrypoint
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # passed through for ../db_init/init.sh
      LANGFUSE_DB: ${LANGFUSE_DB:-langfuse}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD}

      APP_DB: ${APP_DB:-app}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/db_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    cpus: "1.00"
    mem_limit: 1g
    <<: *default-logging
    networks: [backend]

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: pgbouncer
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # superuser creds (also used by auth_query connection)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_USER: ${APP_DB_USER}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD}

      # DB names created by your init.sh
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB: ${APP_DB:-app}
      LANGFUSE_DB: ${LANGFUSE_DB:-langfuse}

      # Where Postgres is reachable from PgBouncer
      PGB_POSTGRES_HOST: ${PGB_POSTGRES_HOST:-postgres}
      PGB_POSTGRES_PORT: ${PGB_POSTGRES_PORT:-5432}

      # PgBouncer listen
      PGB_LISTEN_ADDR: ${PGB_LISTEN_ADDR:-0.0.0.0}
      PGB_LISTEN_PORT: ${PGB_LISTEN_PORT:-6432}

    entrypoint: ["/bin/sh", "/pgbouncer-entrypoint.sh"]
    volumes:
      - ../scripts/pgbouncer-entrypoint.sh:/pgbouncer-entrypoint.sh:ro

    ports:
      - "127.0.0.1:${PGB_PORT:-6432}:6432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$$POSTGRES_PASSWORD psql -h 127.0.0.1 -p $$PGB_LISTEN_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' >/dev/null"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    cpus: "0.25"
    mem_limit: 128m
    <<: *default-logging
    networks: [backend]
    restart: unless-stopped

  redis:
    image: redis:7.2.12-alpine # pinned, stable :contentReference[oaicite:2]{index=2}
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    cpus: "0.50"
    mem_limit: 1g
    <<: *default-logging
    networks: [backend]

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant
    restart: unless-stopped
    networks: [backend]
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # Optional: you can keep a simple liveness check here or omit it entirely

  qdrant-hc:
    image: busybox:1.36
    container_name: qdrant-hc
    depends_on:
      qdrant:
        condition: service_started
    networks: [backend]

    mem_limit: 64m
    mem_reservation: 16m
    cpus: "0.10"
    <<: *default-logging
    command: ["sh", "-c", "sleep 9999999"]
    # Choose ONE endpoint:
    # - /healthz = “alive” style
    # - /readyz = “ready” style (preferred if you want readiness gating)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://qdrant:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped
